<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 | Stock Tracker</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/auth.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <h1>登录</h1>
        <p>登录后查看 GOOGL / NVDA / AVGO 实时面板</p>

        <form class="auth-form" id="login-form">
          <div class="form-field">
            <label for="email">邮箱</label>
            <input id="email" name="email" type="email" required placeholder="you@example.com" />
          </div>
          <div class="form-field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" required minlength="6" placeholder="至少 6 位" />
          </div>
          <div class="form-message" id="form-message"></div>
          <button class="primary-btn" type="submit">邮箱登录</button>
        </form>

        <div class="divider" style="margin: 20px 0">或使用第三方登录</div>
        <div class="oauth-group" id="oauth-group"></div>

        <div class="auth-footer">
          还没有账号？<a href="/register.html">个人注册</a>
        </div>
      </div>
    </div>

    <script src="/static/auth.js"></script>
    <script>
      saveOAuthTokenFromQuery();
      if (getToken()) window.location.href = "/";

      loadAuthProviders("oauth-group");

      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = document.getElementById("form-message");
        showMessage(message, "");
        try {
          const payload = {
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
          };
          const data = await apiFetch("/api/auth/login", {
            method: "POST",
            body: JSON.stringify(payload),
          });
          setToken(data.access_token);
          window.location.href = "/";
        } catch (error) {
          showMessage(message, error.message, "error");
        }
      });
    </script>
  </body>
</html>
